name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Verify pyproject.toml version matches tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! ls "dist/pyinfra_lxd_api_connector-${VERSION}.tar.gz" > /dev/null 2>&1; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject.toml version. Built artifacts:"
            ls dist/
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/pyinfra-lxd-api-connector/
    permissions:
      id-token: write   # Trusted Publisher (OIDC) — no API token needed
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Build release notes from CHANGELOG section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="[$VERSION]" '
            /^## / {
              if (in_section) exit
              if (index($0, v)) in_section=1
              next
            }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          printf '\n📦 PyPI: https://pypi.org/project/pyinfra-lxd-api-connector/%s/\n\n' "$VERSION" >> release_notes.md
          printf '```fish\nuv tool install pyinfra --with pyinfra-lxd-api-connector\n```\n' >> release_notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md \
            dist/*
